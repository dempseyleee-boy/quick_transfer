name: Build All Platforms

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --release

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: flutter build windows --release

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle

      - name: Create Linux Deb
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deb/opt/quick_transfer
          cp -r build/linux/x64/release/bundle/* deb/opt/quick_transfer/
          cat > deb/DEBIAN/control << 'EOF'
Package: quick-transfer
Version: 1.0.0
Architecture: amd64
Depends: libgtk-3-0, liblzma5, libstdc++6
Description: A cross-platform file transfer application
EOF
          dpkg-deb --build deb quick-transfer_1.0.0_amd64.deb

      - name: Upload Deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: quick-transfer_1.0.0_amd64.deb
          path: quick-transfer_1.0.0_amd64.deb

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: build/windows/x64/runner/Release

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Get dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-desktop, build-mobile]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.apk
            artifacts/**/windows-bundle/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
